<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opret bruger — Olsker Cupcakes</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">
        <img th:src="@{/images/logo.png}" alt="Olsker Cupcakes logo" class="navbar-logo">
        <span>Olsker<br>Cupcakes</span>
    </a>
    <div class="navbar-links">
        <a th:href="@{/orders}">Ordrer</a>
        <a th:href="@{/about}">Om os</a>
        <a th:href="@{/login}" class="btn-outline-nav">Log ind</a>
    </div>
    <div class="navbar-right">
        <div class="cart-icon">
            <img th:src="@{/images/cart.png}" alt="Kurv">
        </div>
        <div class="lang-switcher">
            <img th:src="@{/images/flag-da.png}" alt="DA" class="flag">
            <span>DA</span>
        </div>
    </div>
</nav>

<div class="auth-page">

    <!-- Register card — wider, no photo on this page per mockup -->
    <div class="auth-card" style="max-width: 820px; margin: 0 auto;">

        <div class="auth-brand">
            <img th:src="@{/images/logo.png}" alt="logo">
            <span>Olsker<br>Cupcakes</span>
        </div>

        <!-- Mascot (top right of card) -->
        <div class="auth-mascot">
            <img th:src="@{/images/mascot-pink.png}" alt="Cupcake mascot">
        </div>

        <p class="auth-welcome">Velkommen!</p>
        <h1 class="auth-title">Opret ny bruger</h1>

        <!-- Error message -->
        <div class="error-message" th:if="${message}" th:text="${message}"></div>

        <form class="auth-form" method="post" th:action="@{/register}" id="registerForm">

            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">Fornavn</label>
                    <input type="text"
                           id="firstName"
                           name="firstName"
                           placeholder="Indtast dit fornavn..."
                           required>
                </div>
                <div class="form-group">
                    <label for="lastName">Efternavn</label>
                    <input type="text"
                           id="lastName"
                           name="lastName"
                           placeholder="Indtast dit efternavn..."
                           required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="Indtast din email..."
                           required
                           autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="confirmEmail">Bekræft din email</label>
                    <input type="email"
                           id="confirmEmail"
                           name="confirmEmail"
                           placeholder="Bekræft din email..."
                           required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Adgangskode</label>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Indtast din adgangskode..."
                           required
                           autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Bekræft adgangskode</label>
                    <input type="password"
                           id="confirmPassword"
                           name="confirmPassword"
                           placeholder="Bekræft din adgangskode..."
                           required>
                </div>
            </div>

            <div>
                <button type="submit" class="btn-primary">
                    Opret dig <span class="arrow">→</span>
                </button>
            </div>

        </form>

        <div class="auth-footer">
            Har du allerede en bruger? <a th:href="@{/login}" class="form-link">Log ind</a>
        </div>

    </div>
</div>

<script>
    // Client-side validation: email and password must match
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const email = document.getElementById('email').value;
        const confirmEmail = document.getElementById('confirmEmail').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (email !== confirmEmail) {
            e.preventDefault();
            alert('De to email-adresser stemmer ikke overens.');
            return;
        }
        if (password !== confirmPassword) {
            e.preventDefault();
            alert('De to adgangskoder stemmer ikke overens.');
        }
    });
</script>

</body>
</html>
