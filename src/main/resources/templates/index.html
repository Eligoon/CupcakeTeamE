<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olsker Cupcakes</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<!-- NAV -->
<nav class="navbar">

    <a class="navbar-brand" th:href="@{/}">
        <img th:src="@{/images/logo.png}" alt="Olsker Cupcakes logo" class="navbar-logo">
        <span>Olsker<br>Cupcakes</span>
    </a>

    <div class="navbar-links">

        <a th:href="@{/orders}">Ordrer</a>
        <a th:href="@{/about}">Om os</a>

        <th:block th:if="${session.currentUser != null}">
            <span class="navbar-email"
                  th:text="${session.currentUser.email}"></span>
        </th:block>

        <th:block th:unless="${session.currentUser != null}">
            <a th:href="@{/login}" class="btn-outline-nav">Log ind</a>
        </th:block>

    </div>

    <div class="navbar-right">

        <a th:href="@{/orders}" class="cart-icon">
            <img th:src="@{/images/cart.png}" alt="Kurv">
        </a>

    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <p class="hero-text">De bedste cupcakes fra Bornholm!</p>
    <h1 class="hero-title">Velkommen ombord!</h1>
</div>

<!-- BUILDER -->
<div class="index-content">

    <div class="build-section">

        <h2>Byg din cupcake</h2>

        <!-- FORM -->
        <form method="post" th:action="@{/orders/create}">

            <!-- BOTTOM -->
            <label>Bund</label>
            <select id="bottomSelect" name="bottomId" onchange="updatePrice()">
                <option value="">Vælg bund</option>

                <th:block th:each="bottom : ${bottoms}">
                    <option th:value="${bottom.bottomId}"
                            th:data-price="${bottom.price}"
                            th:text="${bottom.name + ' - ' + bottom.price + ' kr'}">
                    </option>
                </th:block>
            </select>

            <!-- TOPPING -->
            <label>Topping</label>
            <select id="toppingSelect" name="toppingId" onchange="updatePrice()">
                <option value="">Vælg topping</option>

                <th:block th:each="topping : ${toppings}">
                    <option th:value="${topping.toppingId}"
                            th:data-price="${topping.price}"
                            th:text="${topping.name + ' - ' + topping.price + ' kr'}">
                    </option>
                </th:block>
            </select>

            <!-- QTY -->
            <label>Antal</label>

            <div class="builder-qty">
                <button type="button" onclick="changeQty(-1)">−</button>

                <span id="qtyDisplay">0</span>

                <button type="button" onclick="changeQty(1)">+</button>
            </div>

            <input type="hidden" name="quantity" id="hiddenQty" value="0">

            <!-- PRICE -->
            <p id="priceDisplay">− kr</p>

            <!-- ADD -->
            <button type="submit" class="add-to-cart-btn" onclick="return validateForm()">
                Læg i kurv
            </button>

        </form>
    </div>

    <!-- POPULAR -->
    <div class="popular-section">

        <h2>Populære kombinationer</h2>

        <div class="combos-grid">

            <th:block th:if="${cupcakes != null}" th:each="cupcake : ${cupcakes}">
                <div class="combo-card">

                    <div class="combo-name" th:text="${cupcake.name}"></div>

                    <div class="combo-desc"
                         th:text="${cupcake.bottomName + ' • ' + cupcake.toppingName}">
                    </div>

                    <div class="combo-price"
                         th:text="${cupcake.price + ' kr'}">
                    </div>

                </div>
            </th:block>

            <th:block th:unless="${cupcakes != null}">
                <p>Ingen populære cupcakes endnu</p>
            </th:block>

        </div>
    </div>

</div>

<!-- SCRIPT -->
<script>
    let qty = 0;

    function changeQty(delta) {
        qty = Math.max(0, qty + delta);
        document.getElementById("qtyDisplay").textContent = qty;
        document.getElementById("hiddenQty").value = qty;
        updatePrice();
    }

    function updatePrice() {

        const bottom = document.getElementById("bottomSelect");
        const topping = document.getElementById("toppingSelect");

        const bPrice = parseFloat(bottom.selectedOptions[0]?.dataset?.price || 0);
        const tPrice = parseFloat(topping.selectedOptions[0]?.dataset?.price || 0);

        if (bPrice && tPrice) {
            const unit = bPrice + tPrice;
            document.getElementById("priceDisplay").textContent =
                unit.toFixed(2) + " kr";
        } else {
            document.getElementById("priceDisplay").textContent = "− kr";
        }
    }

    function validateForm() {
        if (qty <= 0) {
            alert("Vælg antal cupcakes");
            return false;
        }
        return true;
    }
</script>

</body>
</html>
