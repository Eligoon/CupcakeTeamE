<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div class="auth-page">

    <div class="auth-card">

        <h1>Log ind</h1>

        <!-- ERROR MESSAGE -->
        <p class="error-message" th:if="${message}" th:text="${message}"></p>

        <form method="post" th:action="@{/login}">

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-primary">
                Log ind
            </button>

        </form>

        <p>
            Ingen bruger?
            <a th:href="@{/register}">Opret dig</a>
        </p>

    </div>
</div>

</body>
</html>
