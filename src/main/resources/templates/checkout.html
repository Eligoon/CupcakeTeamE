<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tjek ud — Olsker Cupcakes</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- nav -->
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">
        <img th:src="@{/images/logo.png}" alt="Olsker Cupcakes logo" class="navbar-logo">
        <span>Olsker<br>Cupcakes</span>
    </a>
    <div class="navbar-links">
        <a th:href="@{/orders}">Ordrer</a>
        <a th:href="@{/about}">Om os</a>
        <th:block th:if="${session.currentUser != null}">
            <span class="navbar-email" th:text="${session.currentUser.email}"></span>
        </th:block>
        <th:block th:unless="${session.currentUser != null}">
            <a th:href="@{/login}" class="btn-outline-nav">Log ind</a>
        </th:block>
    </div>
    <div class="navbar-right">
        <div class="cart-icon">
            <img th:src="@{/images/cart.png}" alt="Kurv">
        </div>
        <div class="lang-switcher">
            <img th:src="@{/images/flag-da.png}" alt="DA" class="flag">
            <span>DA</span>
        </div>
    </div>
</nav>

<!-- checkout columns -->
<div class="checkout-page">

    <!-- left column -->
    <div class="checkout-card">

        <div class="checkout-brand">
            <img th:src="@{/images/logo.png}" alt="logo">
            <span>Olsker<br>Cupcakes</span>
        </div>

        <h1 class="checkout-title">Tjek ud</h1>

        <!-- choosing your delivery type -->
        <p class="delivery-label">Leveringstype</p>
        <div class="delivery-options">
            <button type="button"
                    class="delivery-btn active"
                    id="pickupBtn"
                    onclick="selectDelivery('pickup')">
                <img th:src="@{/images/icon-shop.png}" alt="">
                Afhent i butik
            </button>
            <div>
                <!-- greyed out delivery -->
                <p class="not-available-label" id="deliveryNotAvailable"
                   th:unless="${deliveryAvailable}">Ikke tilgængelig</p>
                <button type="button"
                        class="delivery-btn"
                        id="deliveryBtn"
                        onclick="selectDelivery('delivery')"
                        th:disabled="${!deliveryAvailable}">
                    <img th:src="@{/images/icon-truck.png}" alt="">
                    Levering
                </button>
            </div>
        </div>

        <!-- error message -->
        <div class="error-message" th:if="${message}" th:text="${message}"></div>

        <!-- if logged in -->
        <th:block th:if="${session.currentUser != null}">
            <form class="checkout-form" method="post" th:action="@{/cart/pay}">
                <input type="hidden" name="orderId" th:value="${orderId}">
                <input type="hidden" name="total" th:value="${total}">
                <input type="hidden" name="deliveryType" id="deliveryTypeInput" value="pickup">

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Fornavn</label>
                        <input type="text" id="firstName" name="firstName"
                               placeholder="Fornavn"
                               th:value="${session.currentUser.firstName ?: ''}">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Efternavn</label>
                        <input type="text" id="lastName" name="lastName"
                               placeholder="Efternavn"
                               th:value="${session.currentUser.lastName ?: ''}">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Telefonnummer</label>
                        <input type="tel" id="phone" name="phone"
                               placeholder="12345678">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email"
                               th:value="${session.currentUser.email}"
                               readonly>
                    </div>
                </div>

                <label class="checkbox-row">
                    <input type="checkbox" name="saveInfo">
                    Gem min information til fremtidige køb
                </label>

            </form>
        </th:block>

        <!-- not logged in form -->
        <th:block th:unless="${session.currentUser != null}">
            <form class="checkout-form" method="post" th:action="@{/cart/pay}">
                <input type="hidden" name="orderId" th:value="${orderId}">
                <input type="hidden" name="total" th:value="${total}">

                <div class="form-group">
                    <label for="phone">Telefonnummer</label>
                    <input type="tel" id="phone" name="phone"
                           placeholder="Indtast dit telefonnummer...">
                </div>

                <p class="not-logged-in-note">
                    <a th:href="@{/login}" class="form-link">Log ind</a>
                    for at bestille. Har du ikke en konto?
                    <a th:href="@{/register}" class="form-link">Opret dig</a>
                </p>
            </form>
        </th:block>

    </div>

    <!-- right column  -->
    <div class="cart-panel">
        <h2 class="cart-panel-title">Din kurv</h2>

        <!-- items in cart -->
        <th:block th:each="item : ${cartItems}">
            <div class="cart-item">
                <!-- Color dot per topping (passed from controller or use default) -->
                <div class="cart-item-dot"
                     th:style="'background:' + (${item.dotColor} ?: '#4B2E83')">
                </div>
                <div class="cart-item-info">
                    <div class="cart-item-name"
                         th:text="${item.bottomName + ' ' + item.toppingName}">
                        Blueberry dream
                    </div>
                    <div class="cart-item-desc"
                         th:text="${item.bottomName + ' • ' + item.toppingName}">
                        Mandel • Blåbærtopping
                    </div>
                    <div class="cart-item-price"
                         th:text="${#numbers.formatDecimal(item.unitPrice, 1, 'COMMA', 2, 'POINT') + ' kr / stk'}">
                        12,00 kr / stk
                    </div>
                </div>
                <div class="cart-item-qty">
                    <button type="button" class="cart-qty-btn">+</button>
                    <span class="cart-qty-num" th:text="${item.quantity}">6</span>
                    <button type="button" class="cart-qty-btn">−</button>
                </div>
            </div>
        </th:block>

        <hr class="cart-divider">

        <!-- summary -->
        <div class="cart-summary-row">
            <span>Subtotal</span>
            <span th:text="${#numbers.formatDecimal(subtotal, 1, 'COMMA', 2, 'POINT') + ' kr'}">204 kr</span>
        </div>
        <div class="cart-summary-row">
            <span>Levering</span>
            <span id="deliveryCost">0 kr</span>
        </div>
        <div class="cart-summary-row total">
            <span>Total</span>
            <span id="totalDisplay"
                  th:text="${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT') + ' kr'}">
                204 kr
            </span>
        </div>

        <label class="terms-row">
            <input type="checkbox" id="termsCheck">
            Jeg har læst <a href="#">handelsbetingelserne</a>.
        </label>

        <!-- pay -->
        <button type="button" class="pay-btn" onclick="submitCheckout()">
            Betal nu <span class="arrow">→</span>
        </button>
    </div>

</div>

<script>
    const baseTotal = /*[[${total}]]*/ 0;
    const deliveryFee = 39;

    function selectDelivery(type) {
        const pickupBtn   = document.getElementById('pickupBtn');
        const deliveryBtn = document.getElementById('deliveryBtn');
        const addressFields = document.getElementById('addressFields');
        const deliveryCost  = document.getElementById('deliveryCost');
        const totalDisplay  = document.getElementById('totalDisplay');
        const input = document.getElementById('deliveryTypeInput');

        if (type === 'pickup') {
            pickupBtn.classList.add('active');
            deliveryBtn.classList.remove('active');
            if (addressFields) addressFields.style.display = 'none';
            deliveryCost.textContent = '0 kr';
            totalDisplay.textContent = baseTotal.toFixed(2).replace('.', ',') + ' kr';
            if (input) input.value = 'pickup';
        } else {
            pickupBtn.classList.remove('active');
            deliveryBtn.classList.add('active');
            if (addressFields) addressFields.style.display = 'block';
            deliveryCost.textContent = deliveryFee.toFixed(2).replace('.', ',') + ' kr';
            totalDisplay.textContent = (baseTotal + deliveryFee).toFixed(2).replace('.', ',') + ' kr';
            if (input) input.value = 'delivery';
        }
    }

    function submitCheckout() {
        const terms = document.getElementById('termsCheck');
        if (!terms.checked) {
            alert('Du skal acceptere handelsbetingelserne for at fortsætte.');
            return;
        }

        const form = document.querySelector('.checkout-form');
        if (form) form.submit();
    }
</script>

</body>
</html>
