<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div class="checkout-page">

    <!-- LEFT SIDE -->
    <div class="checkout-card">

        <h1>Tjek ud</h1>

        <p class="error-message" th:if="${message}" th:text="${message}"></p>

        <form method="post" th:action="@{/cart/pay}">

            <input type="hidden" name="orderId" th:value="${orderId}">
            <input type="hidden" name="total" th:value="${total}">

            <!-- CART ITEMS -->
            <div th:each="item : ${cartItems}" class="cart-item">

                <p th:text="${item.bottomName + ' + ' + item.toppingName}"></p>

                <p>
                    <span th:text="${item.quantity}"></span>
                    x
                    <span th:text="${item.unitPrice}"></span>
                </p>

            </div>

            <!-- TOTAL -->
            <h3>
                Total:
                <span th:text="${total} + ' kr'"></span>
            </h3>

            <button type="submit" class="btn-primary">
                Betal
            </button>

        </form>

    </div>

</div>

</body>
</html>
